gui:
  commitLength:
    show: true
  showFileTree: true
  splitDiff: auto

  theme:
    activeBorderColor:
      - "#cba6f7"
      - bold
    inactiveBorderColor:
      - "#a6adc8"
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - "#313244"
    cherryPickedCommitBgColor:
      - "#45475a"
    cherryPickedCommitFgColor:
      - "#cba6f7"
    unstagedChangesColor:
      - "#f38ba8"
    defaultFgColor:
      - "#cdd6f4"
    searchingActiveBorderColor:
      - "#f9e2af"

  authorColors:
    "*": "#b4befe"

customCommands:
  - key: "b"
    command: "gh browse"
    context: "files"
    description: "Open repo in browser"
  - key: "b"
    command: 'gh browse "{{.SelectedLocalCommit.Sha}}"'
    context: "commits"
    description: "Open commit in browser"
  - key: "P"
    command: "git push --no-verify --force-with-lease"
    context: "global"
    loadingText: "Pushing..."
    description: "Force push with --no-verify"
